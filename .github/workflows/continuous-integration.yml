name: "Continuous Integration"

on:
  pull_request:
    branches:
      - "*.x"
      - "feature/*"
  push:

env:
  fail-fast: true

jobs:
  phpunit:
    name: "PHPUnit"
    runs-on: "ubuntu-20.04"

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
        mongodb-version:
          - "7.0"
          - "6.0"
          - "5.0"
        driver-version:
          - "stable"
        topology:
          - "server"
        dependencies:
          - "highest"
        symfony-version:
          - "stable"
        proxy:
          - "lazy-ghost"
        include:
          # Test against lowest dependencies
          - dependencies: "lowest"
            php-version: "8.1"
            mongodb-version: "5.0"
            driver-version: "1.21.0"
            topology: "server"
            symfony-version: "stable"
            proxy: "lazy-ghost"
          # Test with highest dependencies
          - topology: "server"
            php-version: "8.2"
            mongodb-version: "7.0"
            driver-version: "stable"
            dependencies: "highest"
            symfony-version: "7"
            proxy: "lazy-ghost"
          # Test with a 5.0 replica set
          - topology: "replica_set"
            php-version: "8.2"
            mongodb-version: "5.0"
            driver-version: "stable"
            dependencies: "highest"
            symfony-version: "stable"
            proxy: "lazy-ghost"
          # Test with ProxyManager
          - php-version: "8.2"
            mongodb-version: "5.0"
            driver-version: "stable"
            dependencies: "highest"
            symfony-version: "stable"
            proxy: "proxy-manager"
          # Test with ext-2.0
          - topology: "server"
            php-version: "8.2"
            mongodb-version: "7.0"
            driver-version: "mongodb/mongo-php-driver@v2.x"
            dependencies: "highest"
            symfony-version: "7"
          # Test with a 5.0 sharded cluster
          # Currently disabled due to a bug where MongoDB reports "sharding status unknown"
#          - topology: "sharded_cluster"
#            php-version: "8.2"
#            mongodb-version: "5.0"
#            driver-version: "stable"
#            dependencies: "highest"
#            symfony-version: "stable"
#            proxy: "lazy-ghost"

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"
        with:
          fetch-depth: 2

      - name: Setup cache environment
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php-version }}
          extensions: "mongodb-${{ matrix.driver-version }}, bcmath"
          key: "extcache-v1"

      - name: Cache extensions
        uses: actions/cache@v4
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: "Install PHP"
        uses: "shivammathur/setup-php@v2"
        with:
          php-version: "${{ matrix.php-version }}"
          tools: "pecl"
          extensions: "mongodb-${{ matrix.driver-version }}, bcmath"
          coverage: "none"
          ini-values: "zend.assertions=1"

      - name: "Show driver information"
        run: "php --ri mongodb"

      # This allows installing symfony/console 3.4 and 6
      - name: "Remove phpbench/phpbench"
        run: composer remove --no-update --dev phpbench/phpbench

      - name: "Configure Symfony v7@dev"
        if: "${{ matrix.symfony-version == '7' }}"
        run: |
          composer config minimum-stability dev
          # update symfony deps
          composer require --no-update symfony/console:^7@dev
          composer require --no-update symfony/var-dumper:^7@dev
          composer require --no-update --dev symfony/cache:^7@dev

      - name: "Install dependencies with Composer"
        uses: "ramsey/composer-install@v3"
        with:
          dependency-versions: "${{ matrix.dependencies }}"
          composer-options: "--prefer-dist"

      - name: "Install latest Python version"
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - id: setup-mongodb
        uses: mongodb-labs/drivers-evergreen-tools@master
        with:
          version: ${{ matrix.mongodb-version }}
          topology: ${{ matrix.topology }}

      - name: "Run PHPUnit"
        run: "vendor/bin/phpunit"
        env:
          DOCTRINE_MONGODB_SERVER: ${{ steps.setup-mongodb.outputs.cluster-uri }}
          USE_LAZY_GHOST_OBJECTS: ${{ matrix.proxy == 'lazy-ghost' && '1' || '0' }}"
